<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Süper Bot Yönetim Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; 
            --panel: #1e293b; 
            --text: #f8fafc; 
            --text-muted: #94a3b8;
            --primary: #3b82f6; 
            --primary-hover: #2563eb;
            --success: #10b981; 
            --success-hover: #059669;
            --danger: #ef4444; 
            --danger-hover: #dc2626;
            --warning: #f59e0b;
            --border: #334155;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            padding: 40px 20px; 
            max-width: 900px; 
            margin: 0 auto; 
            line-height: 1.6;
        }

        .header-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .card { 
            background: var(--panel); 
            padding: 30px; 
            border-radius: 16px; 
            margin-bottom: 25px; 
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); 
        }

        h2 { color: #e2e8f0; font-size: 1.25rem; font-weight: 600; margin-top: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;}
        h3 { color: #cbd5e1; font-size: 1rem; font-weight: 600; margin-top: 25px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;}
        
        input, select, textarea { 
            width: 100%; 
            padding: 12px 16px; 
            margin-bottom: 15px; 
            background: #0f172a; 
            color: var(--text); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box; 
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        button { 
            padding: 10px 16px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 500; 
            font-family: 'Inter', sans-serif;
            color: white; 
            transition: all 0.2s; 
            margin-right: 8px; 
            margin-bottom: 8px; 
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);}
        
        .btn-success { background: var(--success); }
        .btn-success:hover { background: var(--success-hover); transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.3);}
        
        .btn-danger { background: var(--danger); padding: 10px 12px;}
        .btn-danger:hover { background: var(--danger-hover); }
        
        .btn-warning { background: transparent; color: var(--warning); border: 1px solid var(--warning); }
        .btn-warning:hover { background: var(--warning); color: #000; }

        .btn-massive { width: 100%; padding: 16px; font-size: 1.1rem; font-weight: 600; justify-content: center; margin-top: 10px; margin-bottom: 20px;}

        .link-container { 
            background: #0f172a; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            padding: 16px; 
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary); 
            transition: all 0.3s ease; 
        }
        
        .link-container:hover {
            border-left-color: var(--success);
            transform: translateX(4px);
        }

        .link-item { display: flex; justify-content: space-between; align-items: center; word-break: break-all; }
        .link-text { flex-grow: 1; margin-right: 20px; font-size: 0.9rem; color: #cbd5e1;}
        .link-text b { color: #38bdf8; font-size: 1rem;}
        .link-actions { display: flex; gap: 8px; flex-wrap: nowrap; align-items: center;}
        
        .preview-box { margin-top: 20px; display: none; text-align: center; background: #000; border-radius: 12px; padding: 15px; border: 1px solid var(--border);}
        
        #log { 
            font-family: 'Consolas', monospace; 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            margin-top: 15px; 
            padding: 15px; 
            background: #0b0f19; 
            border-radius: 8px;
            border: 1px solid #1e293b;
        }

        .badge {
            background: #312e81;
            color: #a5b4fc;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1 class="header-title">Süper Bot Yönetim Paneli</h1>

    <div class="card">
        <h2><span style="font-size: 1.5rem;">🔑</span> Kimlik Doğrulama</h2>
        <input type="password" id="patInput" placeholder="GitHub Personal Access Token (ghp_...)">
        <select id="repoSelect">
            <option value="ig-telegram-bot">🤖 Bot 1 (ig-telegram-bot)</option>
            <option value="ig-telegram-bot2">🤖 Bot 2 (ig-telegram-bot2)</option>
        </select>
        <button class="btn-primary" onclick="ayarlariKaydet()" style="width: 100%; justify-content: center; padding: 14px; font-size: 1rem;">Bağlantıyı Kur ve Listeyi Çek</button>
        <div id="log">Sistem hazır, güvenli bağlantı bekleniyor...</div>
    </div>

    <div class="card" id="yonetimKismi" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px;">
            <h2 style="margin: 0; border: none; padding: 0;">📡 Aktif İstasyon: <span id="repoNameDisplay" style="color: var(--primary);"></span></h2>
            <button class="btn-warning" onclick="linkleriGetir()" style="margin: 0;">🔄 Senkronize Et</button>
        </div>
        
        <button class="btn-success btn-massive" onclick="enAlttakiniGonder()" id="anaGonderBtn">
            <span style="font-size: 1.3rem;">🚀</span> Sıradaki Videoyu (En Alttakini) Ateşle
        </button>
        
        <h3>📥 Yeni Veri Girişi</h3>
        <textarea id="yeniLinkler" rows="3" placeholder="Her satıra bir hedef link gelecek şekilde yapıştırın..."></textarea>
        <button class="btn-success" onclick="linkEkle()">Veritabanına Ekle</button>

        <h3>📋 Operasyon Kuyruğu <span class="badge" id="linkSayisi">0 Video</span></h3>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;">Sistem her zaman listenin en altındaki (sonuncu) videoyu hedef alır.</p>
        <div id="linkListesi"></div>
    </div>

    <script>
        const USERNAME = "MecitDerindere";
        let fileSha = ""; 
        let currentLinks = [];

        window.onload = () => {
            try {
                if(localStorage.getItem('gh_pat')) {
                    document.getElementById('patInput').value = localStorage.getItem('gh_pat');
                }
            } catch (e) { console.log("Yerel depolama engeli."); }
        };

        function log(mesaj, renk="#94a3b8") {
            const saat = new Date().toLocaleTimeString();
            document.getElementById('log').innerHTML = `<span style="color:${renk}">[${saat}] ${mesaj}</span>`;
        }

        function ayarlariKaydet() {
            try {
                const pat = document.getElementById('patInput').value;
                if(!pat) return log("Lütfen geçerli bir token girin!", "#ef4444");
                
                try { localStorage.setItem('gh_pat', pat); } catch(e) {} 
                
                document.getElementById('yonetimKismi').style.display = "block";
                document.getElementById('repoNameDisplay').innerText = document.getElementById('repoSelect').value;
                linkleriGetir();
            } catch (error) { log("Bağlantı Hatası: " + error.message, "#ef4444"); }
        }

        async function githubApi(endpoint, method="GET", body=null) {
            const pat = document.getElementById('patInput').value;
            const options = {
                method: method,
                headers: { "Authorization": `token ${pat}`, "Accept": "application/vnd.github.v3+json", "Content-Type": "application/json" }
            };
            if(body) options.body = JSON.stringify(body);
            const res = await fetch(`https://api.github.com/repos/${USERNAME}/${document.getElementById('repoSelect').value}${endpoint}`, options);
            if (!res.ok) throw new Error(await res.text());
            return method === "GET" ? await res.json() : res;
        }

        const utf8_to_b64 = str => window.btoa(unescape(encodeURIComponent(str)));
        const b64_to_utf8 = str => decodeURIComponent(escape(window.atob(str)));

        async function linkleriGetir() {
            log("Veritabanı ile senkronize olunuyor...", "#f59e0b");
            try {
                const data = await githubApi('/contents/links.txt');
                fileSha = data.sha;
                const content = b64_to_utf8(data.content);
                currentLinks = content.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                ekraniCiz();
                log("Veritabanı bağlantısı başarılı. Liste güncel.", "#10b981");
            } catch (e) { log("Bağlantı Reddedildi: " + e.message, "#ef4444"); }
        }

        function ekraniCiz() {
            document.getElementById('linkSayisi').innerText = currentLinks.length + " Video";
            let html = "";
            currentLinks.forEach((link, index) => {
                html += `
                <div class="link-container" id="kutu-${index}">
                    <div class="link-item">
                        <div class="link-text"><b>${index + 1}.</b> ${link}</div>
                        <div class="link-actions">
                            <button class="btn-warning" onclick="onizlemeGoster(${index}, '${link}')">👁️ İzle</button>
                            <button class="btn-primary" onclick="bunuGonder(${index})">🚀 Gönder</button>
                            <button class="btn-danger" onclick="linkSil(${index})">✕</button>
                        </div>
                    </div>
                    <div id="preview-${index}" class="preview-box"></div>
                </div>`;
            });
            document.getElementById('linkListesi').innerHTML = html;
        }

        function onizlemeGoster(index, url) {
            const kutu = document.getElementById(`preview-${index}`);
            if (kutu.style.display === "block") {
                kutu.style.display = "none";
                kutu.innerHTML = "";
                return;
            }
            let shortcode = "";
            let match = url.match(/(?:reel|p)\/([^\/?#&]+)/);
            if (match && match[1]) shortcode = match[1];

            if (shortcode) {
                kutu.style.display = "block";
                kutu.innerHTML = `<iframe src="https://www.instagram.com/p/${shortcode}/embed/captioned" width="320" height="460" frameborder="0" scrolling="no" allowtransparency="true" style="background:white; border-radius:8px;"></iframe>`;
            } else {
                alert("Bu formattaki linkten önizleme oluşturulamadı.");
            }
        }

        async function dosyayiGuncelle(yeniLinkArrayi, mesaj) {
            try {
                const yeniIcerik = yeniLinkArrayi.join('\n') + '\n';
                await githubApi('/contents/links.txt', 'PUT', { message: mesaj, content: utf8_to_b64(yeniIcerik), sha: fileSha });
            } catch (e) { log("Kayıt Hatası: " + e.message, "#ef4444"); }
        }

        async function linkEkle() {
            const yeni = document.getElementById('yeniLinkler').value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            if(yeni.length === 0) return;
            log("Yeni veriler işleniyor...", "#f59e0b");
            currentLinks = [...yeni, ...currentLinks];
            await dosyayiGuncelle(currentLinks, "Panel üzerinden yeni linkler eklendi");
            document.getElementById('yeniLinkler').value = "";
            await linkleriGetir();
        }

        async function linkSil(index) {
            if(!confirm("Bu kaydı veritabanından tamamen silmek istediğinize emin misiniz?")) return;
            currentLinks.splice(index, 1);
            ekraniCiz(); 
            await dosyayiGuncelle(currentLinks, "Panel üzerinden link silindi");
            await linkleriGetir();
        }

        async function enAlttakiniGonder() {
            if (currentLinks.length === 0) return alert("Kuyrukta gönderilecek video bulunamadı!");
            log("Bot ateşleniyor... (Sistem 15s içinde senkronize olacak)", "#f59e0b");
            document.getElementById('anaGonderBtn').disabled = true;
            document.getElementById('anaGonderBtn').style.opacity = "0.5";
            currentLinks.pop();
            ekraniCiz();

            try {
                await githubApi('/actions/workflows/bot.yml/dispatches', 'POST', { ref: "main" });
                log("Operasyon başarılı! Video Telegram'a aktarılıyor...", "#10b981");
                setTimeout(() => {
                    log("Veritabanı ile yeniden senkronize olunuyor...", "#f59e0b");
                    linkleriGetir();
                    document.getElementById('anaGonderBtn').disabled = false;
                    document.getElementById('anaGonderBtn').style.opacity = "1";
                }, 15000);
            } catch (e) { log("Tetikleme Hatası: " + e.message, "#ef4444"); }
        }

        async function bunuGonder(index) {
            if(!confirm("Bu videoyu kuyruğun en sonuna alıp hemen göndermek istiyor musunuz?")) return;
            log("Özel hedef ayarlanıyor...", "#f59e0b");
            const secilenLink = currentLinks.splice(index, 1)[0]; 
            currentLinks.push(secilenLink);
            await dosyayiGuncelle(currentLinks, "Özel link operasyon sırasına alındı");
            enAlttakiniGonder();
        }
    </script>
</body>
</html>
