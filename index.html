<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Yönetim Konsolu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        
        /* Özel Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Toast Bildirim Animasyonları */
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .toast-enter { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-exit { animation: fadeOut 0.3s ease-out forwards; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#151f32', 900: '#0f172a' },
                        primary: { 500: '#3b82f6', 600: '#2563eb' }
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="ph ph-codesandbox-logo text-3xl text-primary-500"></i>
                <span class="font-semibold text-lg tracking-tight">Otomasyon Konsolu <span class="text-slate-500 text-sm font-normal ml-2">v2.0</span></span>
            </div>
            <div class="flex items-center gap-4 text-sm text-slate-400">
                <div class="flex items-center gap-1.5"><i class="ph ph-shield-check text-emerald-500"></i> Güvenli Bağlantı</div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex flex-col lg:flex-row gap-8">
        
        <div class="w-full lg:w-1/3 flex flex-col gap-6">
            
            <div class="bg-slate-850 rounded-xl border border-slate-800 p-6 shadow-sm">
                <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4 flex items-center gap-2">
                    <i class="ph ph-key"></i> Sistem Erişimi
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Personal Access Token</label>
                        <input type="password" id="patInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-colors" placeholder="ghp_...">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Hedef İstasyon</label>
                        <select id="repoSelect" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-colors appearance-none">
                            <option value="ig-telegram-bot">Bot-1 (ig-telegram-bot)</option>
                            <option value="ig-telegram-bot2">Bot-2 (ig-telegram-bot2)</option>
                        </select>
                    </div>
                    <button onclick="ayarlariKaydet()" class="w-full bg-slate-100 hover:bg-white text-slate-900 font-medium py-2.5 rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
                        <i class="ph ph-plug"></i> Bağlantıyı Başlat
                    </button>
                </div>
            </div>

            <div id="operasyonKarti" class="bg-slate-850 rounded-xl border border-slate-800 p-6 shadow-sm hidden">
                <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4 flex items-center gap-2">
                    <i class="ph ph-terminal-window"></i> Operasyon Merkezi
                </h2>
                <div class="space-y-5">
                    <button onclick="enAlttakiniGonder()" id="anaGonderBtn" class="w-full bg-primary-600 hover:bg-primary-500 text-white font-medium py-3.5 rounded-lg text-sm transition-colors flex items-center justify-center gap-2 shadow-lg shadow-primary-500/20">
                        <i class="ph ph-paper-plane-right text-lg"></i> Sıradaki Videoyu İşle
                    </button>
                    
                    <div class="pt-4 border-t border-slate-800">
                        <label class="block text-xs font-medium text-slate-400 mb-2">Veritabanına Yeni Veri Girişi</label>
                        <textarea id="yeniLinkler" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-primary-500 transition-colors mb-3" placeholder="Her satıra bir URI gelecek şekilde yapıştırın..."></textarea>
                        <button onclick="linkEkle()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 font-medium py-2.5 rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
                            <i class="ph ph-plus-circle"></i> Kuyruğa Ekle
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-2/3 flex flex-col hidden" id="veriTablosuKarti">
            <div class="bg-slate-850 rounded-xl border border-slate-800 shadow-sm flex-grow flex flex-col overflow-hidden">
                
                <div class="px-6 py-5 border-b border-slate-800 flex items-center justify-between bg-slate-850/50">
                    <div class="flex items-center gap-3">
                        <h2 class="text-base font-semibold text-slate-200">Veri Kuyruğu</h2>
                        <span id="linkSayisiBadge" class="bg-slate-800 text-slate-300 text-xs font-medium px-2.5 py-1 rounded-full border border-slate-700">0 Kayıt</span>
                    </div>
                    <button onclick="linkleriGetir()" class="text-slate-400 hover:text-white transition-colors p-2 rounded-md hover:bg-slate-800" title="Senkronize Et">
                        <i class="ph ph-arrows-clockwise text-lg"></i>
                    </button>
                </div>

                <div class="overflow-y-auto p-4 flex-grow relative min-h-[400px]">
                    <div id="linkListesi" class="space-y-2">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toastContainer" class="fixed bottom-6 right-6 flex flex-col gap-3 z-50 pointer-events-none"></div>

    <script>
        const USERNAME = "MecitDerindere";
        let fileSha = ""; 
        let currentLinks = [];

        window.onload = () => {
            try {
                if(localStorage.getItem('gh_pat')) {
                    document.getElementById('patInput').value = localStorage.getItem('gh_pat');
                }
            } catch (e) { console.log("Yerel depolama kısıtlı."); }
        };

        // Profesyonel Toast Bildirim Sistemi
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            let icon = '<i class="ph ph-info text-blue-400 text-xl"></i>';
            let bgClass = 'bg-slate-800 border-slate-700';
            
            if (type === 'success') {
                icon = '<i class="ph ph-check-circle text-emerald-400 text-xl"></i>';
                bgClass = 'bg-slate-850 border-emerald-900/50';
            } else if (type === 'error') {
                icon = '<i class="ph ph-warning-circle text-rose-400 text-xl"></i>';
                bgClass = 'bg-slate-850 border-rose-900/50';
            } else if (type === 'warning') {
                icon = '<i class="ph ph-spinner-gap animate-spin text-amber-400 text-xl"></i>';
            }

            toast.className = `toast-enter flex items-center gap-3 px-4 py-3 rounded-lg border ${bgClass} shadow-lg shadow-black/20 pointer-events-auto min-w-[300px] max-w-md`;
            toast.innerHTML = `${icon} <span class="text-sm font-medium text-slate-200">${message}</span>`;
            
            container.appendChild(toast);

            // Başarılı ve hata mesajlarını 4 saniye sonra sil, spinner'ı tut
            if(type !== 'warning') {
                setTimeout(() => {
                    toast.classList.replace('toast-enter', 'toast-exit');
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            }
            return toast; // Spinner için elementi geri döndür ki sonra silebilelim
        }

        function ayarlariKaydet() {
            try {
                const pat = document.getElementById('patInput').value;
                if(!pat) return showToast("Geçerli bir token gerekiyor.", "error");
                
                try { localStorage.setItem('gh_pat', pat); } catch(e) {} 
                
                document.getElementById('operasyonKarti').classList.remove('hidden');
                document.getElementById('veriTablosuKarti').classList.remove('hidden');
                linkleriGetir();
            } catch (error) { showToast("Sistem Hatası: " + error.message, "error"); }
        }

        async function githubApi(endpoint, method="GET", body=null) {
            const pat = document.getElementById('patInput').value;
            const options = {
                method: method,
                headers: { "Authorization": `token ${pat}`, "Accept": "application/vnd.github.v3+json", "Content-Type": "application/json" }
            };
            if(body) options.body = JSON.stringify(body);
            const res = await fetch(`https://api.github.com/repos/${USERNAME}/${document.getElementById('repoSelect').value}${endpoint}`, options);
            if (!res.ok) throw new Error(await res.text());
            return method === "GET" ? await res.json() : res;
        }

        const utf8_to_b64 = str => window.btoa(unescape(encodeURIComponent(str)));
        const b64_to_utf8 = str => decodeURIComponent(escape(window.atob(str)));

        async function linkleriGetir() {
            const loadingToast = showToast("Veritabanı senkronize ediliyor...", "warning");
            try {
                const data = await githubApi('/contents/links.txt');
                fileSha = data.sha;
                const content = b64_to_utf8(data.content);
                currentLinks = content.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                ekraniCiz();
                loadingToast.remove();
                showToast("Senkronizasyon tamamlandı.", "success");
            } catch (e) { 
                loadingToast.remove();
                showToast("Bağlantı Reddedildi: " + e.message, "error"); 
            }
        }

        function ekraniCiz() {
            document.getElementById('linkSayisiBadge').innerText = `${currentLinks.length} Kayıt`;
            let html = "";
            
            if(currentLinks.length === 0) {
                document.getElementById('linkListesi').innerHTML = `
                    <div class="flex flex-col items-center justify-center h-48 text-slate-500">
                        <i class="ph ph-database text-4xl mb-3 opacity-50"></i>
                        <p class="text-sm">Kuyrukta veri bulunamadı.</p>
                    </div>`;
                return;
            }

            currentLinks.forEach((link, index) => {
                html += `
                <div class="group bg-slate-900 border border-slate-800 hover:border-slate-700 rounded-lg p-3.5 transition-all">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <span class="text-xs font-mono text-slate-500 w-6 text-right">${index + 1}.</span>
                            <div class="truncate text-sm text-slate-300 font-mono" title="${link}">${link}</div>
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                            <button onclick="onizlemeGoster(${index}, '${link}')" class="text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded text-xs font-medium transition-colors flex items-center gap-1.5" title="Önizleme">
                                <i class="ph ph-eye"></i> Görüntüle
                            </button>
                            <button onclick="bunuGonder(${index})" class="text-slate-400 hover:text-primary-400 bg-slate-800 hover:bg-primary-900/30 px-3 py-1.5 rounded text-xs font-medium transition-colors flex items-center gap-1.5" title="İşleme Al">
                                <i class="ph ph-play"></i> İşle
                            </button>
                            <button onclick="linkSil(${index})" class="text-slate-400 hover:text-rose-400 bg-slate-800 hover:bg-rose-900/30 px-2.5 py-1.5 rounded text-xs transition-colors" title="Kayıttan Sil">
                                <i class="ph ph-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div id="preview-${index}" class="hidden mt-4 pt-4 border-t border-slate-800 flex justify-center"></div>
                </div>`;
            });
            document.getElementById('linkListesi').innerHTML = html;
        }

        function onizlemeGoster(index, url) {
            const kutu = document.getElementById(`preview-${index}`);
            if (!kutu.classList.contains('hidden')) {
                kutu.classList.add('hidden');
                kutu.innerHTML = "";
                return;
            }
            let shortcode = "";
            let match = url.match(/(?:reel|p)\/([^\/?#&]+)/);
            if (match && match[1]) shortcode = match[1];

            if (shortcode) {
                kutu.classList.remove('hidden');
                kutu.innerHTML = `<iframe src="https://www.instagram.com/p/${shortcode}/embed/captioned" width="320" height="460" frameborder="0" scrolling="no" allowtransparency="true" class="bg-white rounded-lg border border-slate-700"></iframe>`;
            } else {
                showToast("Bu veri formatı önizlemeyi desteklemiyor.", "error");
            }
        }

        async function dosyayiGuncelle(yeniLinkArrayi, mesaj) {
            try {
                const yeniIcerik = yeniLinkArrayi.join('\n') + '\n';
                await githubApi('/contents/links.txt', 'PUT', { message: mesaj, content: utf8_to_b64(yeniIcerik), sha: fileSha });
            } catch (e) { showToast("Yazma Hatası: " + e.message, "error"); throw e;}
        }

        async function linkEkle() {
            const textarea = document.getElementById('yeniLinkler');
            const yeni = textarea.value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            if(yeni.length === 0) return;
            
            const loadingToast = showToast("Kayıtlar işleniyor...", "warning");
            currentLinks = [...yeni, ...currentLinks];
            
            try {
                await dosyayiGuncelle(currentLinks, "Sistem paneli üzerinden veri girişi");
                textarea.value = "";
                await linkleriGetir();
                loadingToast.remove();
                showToast("Yeni kayıtlar başarıyla eklendi.", "success");
            } catch (e) { loadingToast.remove(); }
        }

        async function linkSil(index) {
            if(!confirm("Kayıt kalıcı olarak silinecektir. Onaylıyor musunuz?")) return;
            currentLinks.splice(index, 1);
            ekraniCiz(); 
            const loadingToast = showToast("Kayıt siliniyor...", "warning");
            try {
                await dosyayiGuncelle(currentLinks, "Sistem paneli üzerinden veri silindi");
                await linkleriGetir();
                loadingToast.remove();
            } catch(e) { loadingToast.remove(); }
        }

        async function enAlttakiniGonder() {
            if (currentLinks.length === 0) return showToast("Kuyrukta işlenecek veri bulunamadı.", "error");
            
            const btn = document.getElementById('anaGonderBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-lg"></i> Sistem Tetikleniyor...';
            btn.classList.replace('bg-primary-600', 'bg-slate-700');
            
            currentLinks.pop();
            ekraniCiz();

            try {
                await githubApi('/actions/workflows/bot.yml/dispatches', 'POST', { ref: "main" });
                showToast("Sistem başarıyla tetiklendi. İşlem arka planda yürütülüyor.", "success");
                
                setTimeout(() => {
                    linkleriGetir();
                    btn.disabled = false;
                    btn.innerHTML = '<i class="ph ph-paper-plane-right text-lg"></i> Sıradaki Videoyu İşle';
                    btn.classList.replace('bg-slate-700', 'bg-primary-600');
                }, 15000);
            } catch (e) { 
                showToast("Tetikleme Hatası: " + e.message, "error"); 
                btn.disabled = false;
                btn.innerHTML = '<i class="ph ph-paper-plane-right text-lg"></i> Sıradaki Videoyu İşle';
                btn.classList.replace('bg-slate-700', 'bg-primary-600');
            }
        }

        async function bunuGonder(index) {
            if(!confirm("Bu kaydı kuyruğun sonuna alıp işlemi derhal başlatmak istiyor musunuz?")) return;
            const secilenLink = currentLinks.splice(index, 1)[0]; 
            currentLinks.push(secilenLink);
            
            const loadingToast = showToast("Özel rota ayarlanıyor...", "warning");
            try {
                await dosyayiGuncelle(currentLinks, "Özel operasyon sırası atandı");
                loadingToast.remove();
                enAlttakiniGonder();
            } catch(e) { loadingToast.remove(); }
        }
    </script>
</body>
</html>
